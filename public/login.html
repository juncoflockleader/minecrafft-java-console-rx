<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecrafft Console — Sign in</title>
    <style>
      :root { --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --border:#2a2f3a; --text:#d7dce5; --muted:#8a92a3; --accent:#5db073; --err:#ff6b6b; }
      * { box-sizing: border-box; }
      html,body { height:100%; margin:0; background:var(--bg); color:var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .wrap { min-height:100%; display:flex; align-items:center; justify-content:center; padding:24px; }
      form { background:var(--panel); border:1px solid var(--border); border-radius:14px;
        padding:28px; width:100%; max-width:340px; }
      h1 { font-size:18px; margin:0 0 4px; }
      h1 span { color:var(--accent); }
      p.sub { color:var(--muted); font-size:13px; margin:0 0 20px; }
      label { display:block; font-size:12px; color:var(--muted); margin:12px 0 4px; }
      input { width:100%; background:var(--panel2); border:1px solid var(--border); border-radius:8px;
        color:var(--text); padding:10px 12px; font-size:14px; outline:none; }
      input:focus { border-color:var(--accent); }
      button { width:100%; margin-top:20px; background:var(--accent); color:#0b0d10; border:none;
        border-radius:8px; padding:11px; font-weight:700; font-size:14px; cursor:pointer; }
      button:hover { background:#6cc285; }
      .error { color:var(--err); font-size:13px; min-height:18px; margin-top:12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <form id="login-form">
        <h1>⛏ Minecrafft <span>Console</span></h1>
        <p class="sub">Sign in to manage the server.</p>
        <label for="user">Username</label>
        <input id="user" autocomplete="username" autocapitalize="off" autofocus />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
        <button type="submit">Sign in</button>
        <div class="error" id="error"></div>
      </form>
    </div>
    <script>
      const form = document.getElementById("login-form");
      const err = document.getElementById("error");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        err.textContent = "";
        const user = document.getElementById("user").value;
        const password = document.getElementById("password").value;
        const btn = form.querySelector("button");
        btn.disabled = true;
        try {
          const r = await fetch("/api/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ user, password }),
          });
          if (r.ok) { location.href = "/"; return; }
          err.textContent = r.status === 401 ? "Invalid username or password." : "Sign-in failed.";
        } catch {
          err.textContent = "Could not reach the server.";
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
